name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release:
        description: 'For create a release? Set to "true" to publish.'
        required: false
        default: 'false'
      version:
        description: 'Release version tag, e.g. v1.2.3 (required when release=true for manual run)'
        required: false
        default: ''
  workflow_call:
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      APT_GPG_PRIVATE_KEY:
        required: true

jobs:
  security_scan:
    name: Security scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks scan
        uses: zricethezav/gitleaks-action@v2
      - name: Upload gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif

  build_apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          architecture: x64
      # actionlint: disable=expr
      - name: Configure Android signing
        run: |
          ANDROID_KEYSTORE_BASE64='${{ secrets.ANDROID_KEYSTORE_BASE64 }}'
          ANDROID_KEYSTORE_PASSWORD='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}'
          ANDROID_KEY_ALIAS='${{ secrets.ANDROID_KEY_ALIAS }}'
          ANDROID_KEY_PASSWORD='${{ secrets.ANDROID_KEY_PASSWORD }}'
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "Android signing secrets are not configured. Skipping release keystore setup and falling back to debug signing." >&2
            exit 0
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
          } > android/key.properties
          chmod 600 android/app/upload-keystore.jks
          chmod 600 android/key.properties
      # actionlint: enable=expr
      - name: Flutter pub get
        run: flutter pub get
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons
      - name: Build release APK
        run: flutter build apk --release -v
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build_linux:
    name: Build Linux installer (.deb)
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libnotify-dev \
            liblzma-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          architecture: x64
      - name: Flutter pub get
        run: flutter pub get
      - name: Install Fastforge
        run: |
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Build Linux deb package (Fastforge)
        run: fastforge package --platform linux --targets deb
      - name: Collect Linux deb artifact
        id: collect_linux_deb
        run: |
          set -euo pipefail
          deb_path=$(find dist build -type f -name '*.deb' | head -n1 || true)
          if [ -z "$deb_path" ]; then
            echo "No .deb artifact found after Fastforge packaging." >&2
            exit 1
          fi
          mkdir -p build/packaged
          cp "$deb_path" build/packaged/emargator-linux.deb
          echo "deb_path=build/packaged/emargator-linux.deb" >> "$GITHUB_OUTPUT"
      - name: Upload Linux .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: ${{ steps.collect_linux_deb.outputs.deb_path }}

  build_windows:
    name: Build Windows installer (.exe)
    runs-on: windows-latest
    needs: security_scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
      
      - name: Install MSVC Build Tools
        uses: microsoft/setup-msbuild@v2

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      
      - name: Flutter pub get
        run: flutter pub get

      - name: Install Fastforge
        shell: pwsh
        run: |
          dart pub global activate fastforge
          "$env:USERPROFILE\\AppData\\Local\\Pub\\Cache\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Build Windows installer (Fastforge)
        shell: pwsh
        run: fastforge package --platform windows --targets exe
      
      - name: Collect Windows installer artifact
        id: collect_windows_installer
        shell: pwsh
        run: |
          $setupCandidate = Get-ChildItem -Path dist,build -Filter *.exe -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '(?i)(setup|installer)' } |
            Select-Object -First 1

          if (-not $setupCandidate) {
            $setupCandidate = Get-ChildItem -Path dist,build -Filter *.exe -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -notmatch 'runner[\\/]Release' } |
              Select-Object -First 1
          }

          if (-not $setupCandidate) {
            throw "No Windows installer .exe found after Fastforge packaging."
          }

          $destination = "build/packaged/emargator-windows-setup.exe"
          $destDir = Split-Path -Parent $destination
          if (-not (Test-Path $destDir)) {
            New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          }

          Copy-Item $setupCandidate.FullName $destination -Force
          "installer_path=$destination" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      
      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.collect_windows_installer.outputs.installer_path }}

  prepare_release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    needs:
      - build_apk
      - build_linux
      - build_windows
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      base_release_tag: ${{ steps.release_meta.outputs.base_release_tag }}
      should_release: ${{ steps.release_meta.outputs.should_release }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install yq
        run: |
          set -euo pipefail
            curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /tmp/yq
            chmod +x /tmp/yq
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq
          yq --version
      - name: Derive release version from pubspec
        id: release_meta
        env:
          MANUAL_VERSION_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' && github.event.inputs.version || '' }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          if [ -n "${MANUAL_VERSION_INPUT}" ]; then
            raw_version="${MANUAL_VERSION_INPUT#v}"
          else
            raw_version=$(yq -r '.version // ""' pubspec.yaml)
            raw_version=${raw_version%%+*}
          fi

          raw_version=$(echo "${raw_version}" | tr -d '[:space:]')
          raw_version=${raw_version#v}

          if [ -z "${raw_version}" ]; then
            echo "Unable to determine app version from pubspec.yaml" >&2
            exit 1
          fi

          release_tag="v${raw_version}"
          base_release_tag="v${raw_version}"
          should_release="true"
          is_prerelease="false"
          reason="ready"

          latest_version=$(git tag -l 'v*' | sed -E 's/^v//' | sed -E 's/\+.*$//' | sort -V | tail -n1 || true)
          if [ "$should_release" = "true" ] && [ -n "$latest_version" ]; then
            highest=$(printf '%s\n%s\n' "$latest_version" "$raw_version" | sort -V | tail -n1)
            if [ "$highest" != "$raw_version" ]; then
              should_release="false"
              reason="not-newer"
            elif [ "$latest_version" = "$raw_version" ]; then
              is_prerelease="true"
              release_tag="v${raw_version}+${BUILD_NUMBER}"
              reason="same-version-prerelease"
            fi
          elif git rev-parse --verify --quiet "$release_tag" > /dev/null; then
            is_prerelease="true"
            release_tag="v${raw_version}+${BUILD_NUMBER}"
            reason="tag-exists-prerelease"
          fi

          if [ "$should_release" = "true" ] && git rev-parse --verify --quiet "$release_tag" > /dev/null; then
            should_release="false"
            reason="generated-tag-exists"
          fi

          if [ "$should_release" = "true" ] && [ "$is_prerelease" = "true" ]; then
            if [ -z "${BUILD_NUMBER}" ] || ! [[ "${BUILD_NUMBER}" =~ ^[0-9]+$ ]]; then
              should_release="false"
              reason="invalid-build-number"
            fi
          fi

          echo "Release decision: tag=$release_tag should_release=$should_release prerelease=$is_prerelease reason=$reason"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "base_release_tag=$base_release_tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

  publish_release:
    name: Publish release (conditional)
    runs-on: ubuntu-latest
    needs:
      - prepare_release
    if: ${{ needs.prepare_release.outputs.should_release == 'true' }}
    env:
      RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
      RELEASE_BASE_TAG: ${{ needs.prepare_release.outputs.base_release_tag }}
      RELEASE_IS_PRERELEASE: ${{ needs.prepare_release.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release_artifacts/android
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release_artifacts/linux
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release_artifacts/windows
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          release_name: ${{ env.RELEASE_IS_PRERELEASE == 'true' && format('{0} (debug +{1})', env.RELEASE_BASE_TAG, github.run_number) || env.RELEASE_TAG }}
          body: "Release ${{ env.RELEASE_TAG }} generated by CI"
          draft: false
          prerelease: ${{ env.RELEASE_IS_PRERELEASE == 'true' }}
      - name: Keep prerelease out of latest spotlight
        if: ${{ env.RELEASE_IS_PRERELEASE == 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const tag = process.env.RELEASE_TAG;
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            await github.request('PATCH /repos/{owner}/{repo}/releases/{release_id}', {
              owner,
              repo,
              release_id: release.data.id,
              make_latest: 'false'
            });
      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release_artifacts/android/app-release.apk
          asset_name: emargator-${{ env.RELEASE_TAG }}.apk
          asset_content_type: application/vnd.android.package-archive
      - name: Upload Linux deb to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release_artifacts/linux/emargator-linux.deb
          asset_name: emargator-${{ env.RELEASE_TAG }}-linux.deb
          asset_content_type: application/vnd.debian.binary-package
      - name: Upload Windows installer to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release_artifacts/windows/emargator-windows-setup.exe
          asset_name: emargator-${{ env.RELEASE_TAG }}-windows-setup.exe
          asset_content_type: application/vnd.microsoft.portable-executable

  update_apt_repo:
    name: Update APT repository (gh-pages)
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - build_linux
    if: ${{ needs.prepare_release.outputs.should_release == 'true' }}
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
      RELEASE_IS_PRERELEASE: ${{ needs.prepare_release.outputs.is_prerelease }}
      APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
    steps:
      - name: Install APT repository tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils

      - name: Checkout gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "${REPO_URL}" gh-pages > /dev/null 2>&1; then
            git clone --single-branch --branch gh-pages "${REPO_URL}" gh-pages
          else
            mkdir gh-pages && cd gh-pages
            git init
            git checkout --orphan gh-pages
            git commit --allow-empty -m "Initialize gh-pages branch"
          fi

      - name: Download Linux .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: deb-artifact

      - name: Prepare and add .deb package
        run: |
          set -euo pipefail

          if [ "${RELEASE_IS_PRERELEASE}" = "true" ]; then
            PKG_NAME="emargator-beta"
            CONFLICTS="emargator"
          else
            PKG_NAME="emargator"
            CONFLICTS="emargator-beta"
          fi

          # Extract original .deb
          mkdir -p repack
          dpkg-deb -R deb-artifact/emargator-linux.deb repack/

          ARCH=$(grep -oP '(?<=^Architecture: ).+' repack/DEBIAN/control)
          VERSION=$(grep -oP '(?<=^Version: ).+' repack/DEBIAN/control)

          # Set correct package name
          sed -i "s/^Package:.*/Package: ${PKG_NAME}/" repack/DEBIAN/control

          # Add Conflicts / Replaces so the two variants cannot coexist
          grep -q '^Conflicts:' repack/DEBIAN/control \
            && sed -i "s/^Conflicts:.*/Conflicts: ${CONFLICTS}/" repack/DEBIAN/control \
            || echo "Conflicts: ${CONFLICTS}" >> repack/DEBIAN/control

          grep -q '^Replaces:' repack/DEBIAN/control \
            && sed -i "s/^Replaces:.*/Replaces: ${CONFLICTS}/" repack/DEBIAN/control \
            || echo "Replaces: ${CONFLICTS}" >> repack/DEBIAN/control

          # Rebuild .deb with the new control metadata
          DEB_FILE="${PKG_NAME}_${VERSION}_${ARCH}.deb"
          dpkg-deb -b repack/ "${DEB_FILE}"

          # Remove previous versions of this package from the repo
          rm -f "gh-pages/${PKG_NAME}_"*.deb

          # Add the new .deb to the repo
          cp "${DEB_FILE}" gh-pages/

      - name: Generate APT repository metadata
        run: |
          cd gh-pages

          # Packages index
          dpkg-scanpackages --multiversion . /dev/null > Packages
          gzip -k -f Packages

          # Release file
          apt-ftparchive release . > Release

      - name: Sign repository with GPG
        run: |
          echo "${APT_GPG_PRIVATE_KEY}" | gpg --batch --import
          cd gh-pages
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clearsign -o InRelease Release
          gpg --batch --yes --armor --export > public.key

      - name: Generate index page
        run: |
          set -euo pipefail
          REPO_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          HAS_GPG="false"
          [ -f gh-pages/public.key ] && HAS_GPG="true"

          cat > gh-pages/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Emargator – Dépôt APT</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #222; }
              h1 { border-bottom: 2px solid #0366d6; padding-bottom: .5rem; }
              pre { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 1rem; overflow-x: auto; }
              code { background: #f6f8fa; padding: .15em .3em; border-radius: 4px; font-size: 0.95em; }
              .note { background: #fff8c5; border: 1px solid #d4a72c; border-radius: 6px; padding: .75rem 1rem; margin: 1rem 0; }
              a { color: #0366d6; }
            </style>
          </head>
          <body>
            <h1>Emargator – Dépôt APT</h1>
            <p>Ce dépôt APT fournit deux paquets :</p>
            <ul>
              <li><strong>emargator</strong> – version stable</li>
              <li><strong>emargator-beta</strong> – version bêta (pré-release)</li>
            </ul>
            <p>Les deux paquets sont en conflit : un seul peut être installé à la fois.</p>

            <h2>Installation</h2>

            <div id="gpg-instructions" style="display:none;">
              <h3>1. Importer la clé GPG</h3>
              <pre>curl -fsSL __REPO_URL__/public.key | sudo gpg --dearmor -o /usr/share/keyrings/emargator.gpg</pre>

              <h3>2. Ajouter le dépôt</h3>
              <pre>echo "deb [signed-by=/usr/share/keyrings/emargator.gpg] __REPO_URL__ ./" \
            | sudo tee /etc/apt/sources.list.d/emargator.list</pre>
            </div>

            <div id="nogpg-instructions" style="display:none;">
              <h3>1. Ajouter le dépôt</h3>
              <pre>echo "deb [trusted=yes] __REPO_URL__ ./" \
            | sudo tee /etc/apt/sources.list.d/emargator.list</pre>
            </div>

            <h3 id="install-step-title">2. Installer</h3>
            <pre>sudo apt update

          # Version stable
          sudo apt install emargator

          # OU version bêta
          sudo apt install emargator-beta</pre>

            <h3 id="update-step-title">3. Mettre à jour</h3>
            <pre>sudo apt update && sudo apt upgrade</pre>

            <div class="note">
              <strong>Note :</strong> <code>emargator</code> et <code>emargator-beta</code> ne peuvent pas
              être installés en même temps. L'installation de l'un supprimera automatiquement l'autre.
            </div>

            <script>
              var hasGpg = "__HAS_GPG__" === "true";
              if (hasGpg) {
                document.getElementById("gpg-instructions").style.display = "block";
                document.getElementById("install-step-title").textContent = "3. Installer";
                document.getElementById("update-step-title").textContent = "4. Mettre à jour";
              } else {
                document.getElementById("nogpg-instructions").style.display = "block";
              }
            </script>
          </body>
          </html>
          HTMLEOF

          sed -i "s|__REPO_URL__|${REPO_URL}|g" gh-pages/index.html
          sed -i "s|__HAS_GPG__|${HAS_GPG}|g" gh-pages/index.html

          # Prevent Jekyll processing on GitHub Pages
          touch gh-pages/.nojekyll

      - name: Commit and push to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update APT repository – ${RELEASE_TAG}" || { echo "No changes to commit"; exit 0; }
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
